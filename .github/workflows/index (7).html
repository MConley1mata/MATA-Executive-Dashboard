<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATA Executive Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --white:#FFFFFF; --beige:#F1EADB; --beige-line:#E4D9C2;
    --blue:#1B4F8C; --blue-dark:#123863; --yellow:#F2B705;
    --ink:#25313F; --muted:#6E7A87; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--beige);color:var(--ink);font-family:'Inter', sans-serif;}
  .app{max-width:1240px;margin:0 auto;padding:0 26px 60px;}

  header{background:var(--white);border-bottom:4px solid var(--yellow);padding:22px 26px;margin-bottom:24px;}
  .header-inner{max-width:1240px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
  .brand-text h1{font-family:'Merriweather',serif;font-weight:900;font-size:22px;color:var(--blue-dark);margin:0;}
  .brand-text p{margin:2px 0 0;font-size:12.5px;color:var(--muted);letter-spacing:.03em;}
  .period-badge{background:var(--blue);color:var(--white);font-weight:700;font-size:12.5px;padding:8px 16px;border-radius:20px;}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
  .kpi-card{background:var(--white);border:1px solid var(--beige-line);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--accent, var(--blue));}
  .kpi-label{font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .kpi-value{font-family:'Merriweather',serif;font-size:30px;font-weight:900;color:var(--blue-dark);display:flex;align-items:baseline;gap:6px;}
  .kpi-unit{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--muted);}
  .kpi-sub{margin-top:8px;font-size:12.5px;color:var(--muted);}
  .kpi-sub b{color:var(--ink);}

  .main-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:16px;}
  .panel{background:var(--white);border:1px solid var(--beige-line);border-radius:var(--radius);padding:20px 22px;}
  .panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--beige-line);}
  .panel-title{font-family:'Merriweather',serif;font-size:16.5px;font-weight:700;color:var(--blue-dark);}
  .panel-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .goal-pill{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--yellow);color:var(--blue-dark);}
  .chart-box{height:270px;position:relative;}

  table.routes{width:100%;border-collapse:collapse;font-size:13px;}
  table.routes th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding-bottom:8px;border-bottom:2px solid var(--beige-line);}
  table.routes td{padding:9px 0;border-bottom:1px solid var(--beige-line);}
  table.routes tr:last-child td{border-bottom:none;}
  table.routes td.rank{font-family:'Merriweather',serif;font-weight:900;color:var(--blue);width:28px;}
  .bar-track{background:var(--beige);border-radius:6px;height:8px;width:100%;overflow:hidden;}
  .bar-fill{background:var(--blue);height:100%;border-radius:6px;}
  tr.top-route .bar-fill{background:var(--yellow);}
  .trend-up{color:var(--blue);font-weight:700;}
  .trend-down{color:#B5860A;font-weight:700;}

  footer{text-align:center;font-size:11.5px;color:var(--muted);margin-top:26px;}
  .load-msg{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}

  @media(max-width:900px){
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .main-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand-text">
      <h1>Memphis Area Transit Authority</h1>
      <p>Executive Dashboard</p>
    </div>
    <div class="period-badge" id="periodBadge">Loading…</div>
  </div>
</header>

<div class="app" id="app">
  <div class="load-msg" id="loadMsg">Loading dashboard data…</div>
</div>

<script>
async function loadDashboard() {
  let data;
  try {
    const res = await fetch('data.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('data.json not found');
    data = await res.json();
  } catch (err) {
    document.getElementById('loadMsg').textContent =
      'Could not load data.json. Make sure it sits alongside this file.';
    console.error(err);
    return;
  }
  render(data);
}

function render(data) {
  document.getElementById('periodBadge').textContent = `Updated ${data.lastUpdated}`;

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card" style="--accent:var(--blue)">
        <div class="kpi-label">Total Ridership (YTD)</div>
        <div class="kpi-value">${formatNum(data.totalRidershipYTD)} <span class="kpi-unit">riders</span></div>
        <div class="kpi-sub">All modes combined, FY26</div>
      </div>
      <div class="kpi-card" style="--accent:var(--yellow)">
        <div class="kpi-label">On-Time Perf. — Fixed Route</div>
        <div class="kpi-value">${data.otpFixedRoute}<span class="kpi-unit">%</span></div>
        <div class="kpi-sub">Goal: <b>${data.otpFixedRouteGoal}%</b></div>
      </div>
      <div class="kpi-card" style="--accent:var(--blue)">
        <div class="kpi-label">On-Time Perf. — Paratransit</div>
        <div class="kpi-value">${data.otpParatransit}<span class="kpi-unit">%</span></div>
        <div class="kpi-sub">Goal: <b>${data.otpParatransitGoal}%</b></div>
      </div>
      <div class="kpi-card" style="--accent:var(--yellow)">
        <div class="kpi-label">Top Route</div>
        <div class="kpi-value">${formatNum(data.topRoutes[0].riders)} <span class="kpi-unit">riders</span></div>
        <div class="kpi-sub"><b>${data.topRoutes[0].route}</b>, FY26 total</div>
      </div>
    </div>

    <div class="main-grid">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">Ridership by Mode</div>
            <div class="panel-sub">Monthly boardings, FY26 (Jul–Jun)</div>
          </div>
        </div>
        <div class="chart-box"><canvas id="ridershipChart"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">On-Time Performance</div>
            <div class="panel-sub">Fixed Route vs. Paratransit</div>
          </div>
          <span class="goal-pill">Goal lines shown</span>
        </div>
        <div class="chart-box"><canvas id="otpChart"></canvas></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Top 10 Routes by Ridership</div>
          <div class="panel-sub">FY26 year-to-date totals</div>
        </div>
      </div>
      <table class="routes">
        <thead><tr><th>#</th><th>Route</th><th>Riders (FY26)</th><th style="width:40%;">Share of Top Route</th></tr></thead>
        <tbody id="routeTableBody"></tbody>
      </table>
    </div>

    <div class="panel" id="otpRoutePanel">
      <div class="panel-head">
        <div>
          <div class="panel-title">On-Time Performance by Route</div>
          <div class="panel-sub">Current month, worst to best, with 3-month trend</div>
        </div>
      </div>
      <table class="routes">
        <thead><tr><th>Route</th><th>OTP %</th><th>Trend</th><th style="width:40%;">Performance</th></tr></thead>
        <tbody id="otpRouteTableBody"></tbody>
      </table>
    </div>

    <footer>MATA EXECUTIVE DASHBOARD — DATA SOURCE: MAYOR'S DASHBOARD FY26, FIXED ROUTE RIDERSHIP RANKINGS &amp; MATA STATS UPDATE · Auto-updated via GitHub Actions</footer>
  `;

  buildCharts(data);
  buildTable(data.topRoutes);
  buildOtpRouteTable(data.otpByRoute || []);
}

function formatNum(n) {
  return Number(n).toLocaleString();
}

function buildCharts(data) {
  Chart.defaults.font.family = "'Inter', sans-serif";
  Chart.defaults.color = '#6E7A87';
  const months = data.ridershipByMode.months;

  new Chart(document.getElementById('ridershipChart'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [
        { label:'MotorBus (Fixed Route)', data:data.ridershipByMode.motorbus,
          borderColor:'#1B4F8C', backgroundColor:'rgba(27,79,140,0.10)',
          borderWidth:2.5, pointRadius:3, tension:0.3, fill:true, yAxisID:'y' },
        { label:'Paratransit', data:data.ridershipByMode.paratransit,
          borderColor:'#F2B705', backgroundColor:'rgba(242,183,5,0.12)',
          borderWidth:2.5, pointRadius:3, tension:0.3, fill:true, yAxisID:'y1' },
        { label:'Trolley (Steel Rail)', data:data.ridershipByMode.trolley,
          borderColor:'#25313F', backgroundColor:'rgba(37,49,63,0.08)',
          borderWidth:2, pointRadius:3, tension:0.3, fill:true, yAxisID:'y1' }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{boxWidth:10, padding:14, font:{size:11}} } },
      scales:{
        y:{ position:'left', title:{display:true,text:'MotorBus riders',font:{size:10}}, grid:{color:'#E4D9C2'} },
        y1:{ position:'right', title:{display:true,text:'Paratransit / Trolley riders',font:{size:10}}, grid:{drawOnChartArea:false} },
        x:{ grid:{display:false} }
      }
    }
  });

  new Chart(document.getElementById('otpChart'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label:'Fixed Route OTP %', data:data.otpTrend.fixedRoute, backgroundColor:'#1B4F8C', borderRadius:4, maxBarThickness:16 },
        { label:'Paratransit OTP %', data:data.otpTrend.paratransit, backgroundColor:'#F2B705', borderRadius:4, maxBarThickness:16 },
        { label:`Fixed Route Goal (${data.otpFixedRouteGoal}%)`, data:Array(months.length).fill(data.otpFixedRouteGoal),
          type:'line', borderColor:'#1B4F8C', borderDash:[5,4], borderWidth:1.5, pointRadius:0, fill:false },
        { label:`Paratransit Goal (${data.otpParatransitGoal}%)`, data:Array(months.length).fill(data.otpParatransitGoal),
          type:'line', borderColor:'#F2B705', borderDash:[5,4], borderWidth:1.5, pointRadius:0, fill:false }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{boxWidth:10, padding:12, font:{size:10}} } },
      scales:{ y:{ min:40, max:100, grid:{color:'#E4D9C2'} }, x:{ grid:{display:false} } }
    }
  });
}

function buildTable(routes) {
  const topValue = routes[0].riders;
  const tbody = document.getElementById('routeTableBody');
  routes.forEach((r, i) => {
    const pct = Math.round((r.riders / topValue) * 100);
    const tr = document.createElement('tr');
    if (i === 0) tr.classList.add('top-route');
    tr.innerHTML = `
      <td class="rank">${i+1}</td>
      <td>${r.route}</td>
      <td>${formatNum(r.riders)}</td>
      <td><div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div></td>
    `;
    tbody.appendChild(tr);
  });
}

function buildOtpRouteTable(routes) {
  const tbody = document.getElementById('otpRouteTableBody');
  if (!routes.length) {
    document.getElementById('otpRoutePanel').style.display = 'none';
    return;
  }
  routes.forEach(r => {
    const tr = document.createElement('tr');
    const trendClass = r.trend === '↑' ? 'trend-up' : r.trend === '↓' ? 'trend-down' : '';
    tr.innerHTML = `
      <td>${r.route}</td>
      <td>${r.otp}%</td>
      <td class="${trendClass}">${r.trend || '—'}</td>
      <td><div class="bar-track"><div class="bar-fill" style="width:${r.otp}%;"></div></div></td>
    `;
    tbody.appendChild(tr);
  });
}

loadDashboard();
</script>
</body>
</html>
