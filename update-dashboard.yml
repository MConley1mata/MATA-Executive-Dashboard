name: Update Dashboard Data

on:
  schedule:
    # Runs daily at 11:00 UTC (6:00 AM Central during CDT)
    - cron: '0 11 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Download latest stats workbook from OneDrive
        env:
          ONEDRIVE_XLSX_URL: ${{ secrets.ONEDRIVE_XLSX_URL }}
        run: |
          if [ -z "$ONEDRIVE_XLSX_URL" ]; then
            echo "ONEDRIVE_XLSX_URL secret is not set - skipping download, using committed file instead."
          else
            curl -L "$ONEDRIVE_XLSX_URL" -o data/stats_update.xlsx
            echo "Downloaded fresh stats_update.xlsx from OneDrive."
          fi

      - name: Run data update script
        run: python scripts/update_data.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data/stats_update.xlsx
          git diff --staged --quiet || git commit -m "Auto-update dashboard data"
          git push
